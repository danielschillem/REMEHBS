# ══════════════════════════════════════════════
#  REMEHBS Frontend — Netlify Config
# ══════════════════════════════════════════════

[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# SPA : toutes les routes vers index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION  = "22"
  VITE_API_URL  = "https://remehbs-api.onrender.com/api"
